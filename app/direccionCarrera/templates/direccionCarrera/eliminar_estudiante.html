{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white shadow-lg rounded-lg p-6 text-center">
    <h2 class="text-2xl font-bold mb-4">Confirmar eliminación</h2>
    <p class="mb-6">¿Estás seguro de eliminar al estudiante <strong>{{ estudiante.usuario.get_full_name }}</strong> ({{ estudiante.RU }})?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Sí, eliminar</button>
            <a href="{% url 'direccionCarrera:gestion_estudiantes' %}" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
