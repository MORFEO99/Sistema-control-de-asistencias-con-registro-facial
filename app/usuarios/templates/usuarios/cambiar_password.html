{% extends "base.html" %} 
{% block content %}
<div class="max-w-md mx-auto bg-white shadow-lg rounded-xl p-8 mt-10">
    <h2 class="text-2xl font-bold text-center mb-6">Cambiar Contraseña</h2>
    
    {% if exito %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
            {{ exito }}
        </div>
    {% endif %}
    {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Nueva contraseña</label>
            <input type="password" name="nueva_password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Confirmar contraseña</label>
            <input type="password" name="confirmar_password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" required>
        </div>
        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
            Guardar nueva contraseña
        </button>
    </form>
    <div class="text-center mt-4">
        <a href="{% url 'estudiante:perfil' %}" class="text-blue-500 hover:underline">Volver al perfil</a>
    </div>
</div>
{% endblock %}
