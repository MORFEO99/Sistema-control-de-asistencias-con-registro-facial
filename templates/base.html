{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema Control de Asistencias{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 p-0 bg-gray-100">
   <!-- Header institucional -->
   <nav class="bg-white shadow-md p-4 flex items-center">
        <img src="{% static 'logoSalesiana.png' %}" alt="Logo Universidad Salesiana" class="h-12 mr-4">
        <h1 class="text-2xl font-bold text-blue-700">UNIVERSIDAD SALESIANA DE BOLIVIA</h1>
   </nav>

   <!-- Layout principal -->
   <div class="flex min-h-screen">
       {% block sidebar %}{% endblock %}
       <main class="flex-1 p-10">
           {% block content %}{% endblock %}
       </main>
   </div>
</body>
</html>
